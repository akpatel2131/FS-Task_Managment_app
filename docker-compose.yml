services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: development
      MONGO_URI: mongodb://mongo:27017/task_management_app
      JWT_SECRET: change_me_to_a_long_random_secret
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost:5173
      ADMIN_INVITE_CODE: admin-secret

volumes:
  mongo_data:
